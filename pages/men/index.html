<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Men's Collection · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>

  <section class="page-head">
    <div class="container">
      <div class="crumbs"><a href="../">Home</a> · Men</div>
      <h1>Men's collection</h1>
      </div>
  </section>
  <section class="container section-tight">
    <div class="filter-bar" id="filter-bar"></div>
    <div class="prod-grid" id="prod-grid"></div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('men');</script>
<script>
const CATEGORY = 'men';
const all = ZEN.byCategory(CATEGORY);
const subs = ZEN.subcategoriesOf(CATEGORY);
let activeSub = 'all';
let sortMode = 'featured';
const fb = document.getElementById('filter-bar');
fb.innerHTML =
  '<button class="chip active" data-sub="all">All</button>' +
  subs.map(s => '<button class="chip" data-sub="'+s+'">'+ZEN.cap(s.replace(/-/g,' '))+'</button>').join('') +
  '<div class="filter-spacer"></div>' +
  '<select class="sort-select" id="sort-select">' +
  '<option value="featured">Featured</option>' +
  '<option value="price-asc">Price: Low to high</option>' +
  '<option value="price-desc">Price: High to low</option>' +
  '<option value="name">Name</option></select>';
fb.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  fb.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  activeSub = c.dataset.sub;
  render();
}));
document.getElementById('sort-select').addEventListener('change', (e) => { sortMode = e.target.value; render(); });
function render() {
  let list = activeSub === 'all' ? [...all] : all.filter(p => p.subcategory === activeSub);
  if (sortMode === 'price-asc') list.sort((a,b) => a.price - b.price);
  if (sortMode === 'price-desc') list.sort((a,b) => b.price - a.price);
  if (sortMode === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  const grid = document.getElementById('prod-grid');
  if (!list.length) { grid.innerHTML = '<p class="text-muted">No products found.</p>'; return; }
  grid.innerHTML = list.map(p => {
    const tag = p.oldPrice ? '<span class="prod-tag">Sale</span>' : '';
    const old = p.oldPrice ? '<small>'+ZEN.fmt(p.oldPrice)+'</small>' : '';
    return '<a class="prod-card" href="'+ZEN.url('pages/product/?id='+p.id)+'">'+
      '<div class="prod-thumb">'+tag+'<button class="prod-fav" onclick="event.preventDefault();event.stopPropagation();this.classList.toggle(\'active\');"><i class="fas fa-heart"></i></button><img src="'+ZEN.url(p.image)+'" alt="'+p.name+'"></div>'+
      '<div class="prod-info"><span class="prod-cat">'+ZEN.cap(p.category)+' · '+ZEN.cap(p.subcategory.replace(/-/g,' '))+'</span>'+
      '<span class="prod-name">'+p.name+'</span>'+
      '<div class="prod-row"><span class="prod-price">'+ZEN.fmt(p.price)+old+'</span>'+
      '<button class="prod-add" onclick="event.preventDefault();event.stopPropagation();ZEN.cartAdd(\''+p.id+'\');"><i class="fas fa-plus"></i></button></div></div></a>';
  }).join('');
}
render();
</script>
</body>
</html>
