services:
  - type: web
    name: zen-store-ai-backend
    env: python
    buildCommand: pip install -r core/server/requirements.txt
    startCommand: cd core/server && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: HF_HUB_OFFLINE
        value: "0"
