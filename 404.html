<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen | Page Not Found</title>
    <link rel="icon" href="/Zen-Store/assets/images/logo.jpg">
    <link rel="stylesheet" href="/Zen-Store/assets/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #3886e6;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            text-align: center;
            padding: 20px;
        }
        .nf { max-width: 520px; }
        .nf h1 {
            font-size: 6rem;
            margin: 0;
            letter-spacing: 4px;
        }
        .nf p {
            font-size: 1.2rem;
            margin: 10px 0 30px;
            opacity: 0.9;
        }
        .nf a {
            display: inline-block;
            padding: 12px 28px;
            background: #fff;
            color: #3886e6;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        .nf a:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="nf">
        <h1>404</h1>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/Zen-Store/">Back to Home</a>
    </div>
</body>
</html>
