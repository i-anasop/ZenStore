<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout · Zen Store</title>
  <link rel="icon" href="../../assets/images/logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>

  <section class="page-head">
    <div class="container">
      <div class="crumbs"><a href="../../">Home</a> · <a href="../../cart/">Cart</a> · Checkout</div>
      <h1>Checkout</h1>
    </div>
  </section>
  <section class="container">
    <div class="checkout-layout" id="checkout-root"></div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
const t = ZEN.cartTotals();
const root = document.getElementById('checkout-root');
if (!t.items.length) {
  root.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon"><i class="fas fa-shopping-bag"></i></div><h3>Your cart is empty</h3><p>Add items to your cart before checking out.</p><a class="btn btn-primary" href="../../men/">Browse products</a></div>';
} else {
  const user = ZEN.getUser();
  root.innerHTML =
    '<div class="form-card" style="max-width:none;margin:0;">' +
      '<h3 style="margin-bottom:16px;">Delivery details</h3>' +
      '<form id="checkout-form" novalidate>' +
        '<div class="field"><label>Full name</label><input type="text" id="ck-name" required value="'+(user?user.name:\'\')+'"></div>' +
        '<div class="field"><label>Phone</label><input type="tel" id="ck-phone" required></div>' +
        '<div class="field"><label>Address</label><input type="text" id="ck-addr" required></div>' +
        '<div class="form-row"><div class="field"><label>City</label><input type="text" id="ck-city" required></div><div class="field"><label>Postal code</label><input type="text" id="ck-zip" required></div></div>' +
        '<h3 style="margin:16px 0;">Payment method</h3>' +
        '<div class="pay-options">' +
          '<label class="pay-opt active" id="pay-easypaisa"><input type="radio" name="pay" value="EasyPaisa" checked hidden><div class="pay-opt-icon"><i class="fas fa-mobile-screen"></i></div><div><strong>EasyPaisa</strong><span>Mobile wallet</span></div></label>' +
          '<label class="pay-opt" id="pay-cod"><input type="radio" name="pay" value="Cash on Delivery" hidden><div class="pay-opt-icon"><i class="fas fa-money-bill-wave"></i></div><div><strong>Cash on Delivery</strong><span>Pay when you receive</span></div></label>' +
        '</div>' +
        '<button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:24px;">Place order · '+ZEN.fmt(t.total)+'</button>' +
      '</form>' +
    '</div>' +
    '<aside class="cart-summary" style="position:sticky;top:90px;">' +
      '<h3>Your order</h3>' +
      t.items.map(i => '<div class="summary-row"><span>'+i.product.name+(i.size?\' (\'+i.size+\')\':\'\')+' × '+i.qty+'</span><span>'+ZEN.fmt(i.product.price*i.qty)+'</span></div>').join('') +
      '<div class="summary-row" style="border-top:1px solid var(--c-border);margin-top:12px;padding-top:12px;"><span>Subtotal</span><span>'+ZEN.fmt(t.subtotal)+'</span></div>' +
      '<div class="summary-row"><span>Shipping</span><span>'+(t.shipping?ZEN.fmt(t.shipping):\'Free\')+'</span></div>' +
      '<div class="summary-row"><span>Tax</span><span>'+ZEN.fmt(t.tax)+'</span></div>' +
      '<div class="summary-row total"><span>Total</span><span>'+ZEN.fmt(t.total)+'</span></div>' +
    '</aside>';
  document.querySelectorAll('.pay-opt').forEach(o => o.addEventListener('click', () => {
    document.querySelectorAll('.pay-opt').forEach(x => x.classList.remove('active'));
    o.classList.add('active');
    o.querySelector('input').checked = true;
  }));
  document.getElementById('checkout-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('ck-name').value.trim();
    const phone = document.getElementById('ck-phone').value.trim();
    const addr = document.getElementById('ck-addr').value.trim();
    const city = document.getElementById('ck-city').value.trim();
    const zip = document.getElementById('ck-zip').value.trim();
    if (!name || !phone || !addr || !city || !zip) { ZEN.toast('Please fill in all delivery details.', 'error'); return; }
    const method = document.querySelector('input[name="pay"]:checked').value;
    const totals = ZEN.cartTotals();
    const order = ZEN.createOrder({ user: ZEN.getUser(), address: { name, phone, addr, city, zip }, payment: { method }, items: totals.items, totals: { subtotal: totals.subtotal, shipping: totals.shipping, tax: totals.tax, total: totals.total } });
    ZEN.cartClear();
    location.href = ZEN.url('account/thankyou/');
  });
}
</script>
</body>
</html>
