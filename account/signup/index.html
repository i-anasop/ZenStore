<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>

  <section class="auth-shell">
    <div class="form-card">
      <h2>Create your account</h2>
      <p class="subtitle">Join Zen and start collecting your favourite pairs.</p>
      <form id="signup-form" novalidate>
        <div class="field">
          <label for="name">Full name</label>
          <input type="text" id="name" required autocomplete="name">
          <span class="err" id="name-err"></span>
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
          <span class="err" id="email-err"></span>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
          <span class="err" id="password-err"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>
        <p class="form-foot">Already have an account? <a href="../login/">Sign in</a></p>
      </form>
    </div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
document.getElementById('signup-form').addEventListener('submit', (e) => {
  e.preventDefault();
  ['name','email','password'].forEach(f => document.getElementById(f+'-err').textContent = '');
  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const r = ZEN.signup({ name, email, password });
  if (!r.ok) { ZEN.toast(r.error, 'error'); return; }
  ZEN.toast('Account created. Welcome!', 'success');
  setTimeout(() => location.href = ZEN.url('account/profile/'), 600);
});
</script>
</body>
</html>
