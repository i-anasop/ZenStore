<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>

  <section class="container">
    <div class="thanks" id="thanks-root"></div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
const order = ZEN.ls.get('lastOrder', null);
const root = document.getElementById('thanks-root');
if (!order) {
  root.innerHTML = '<div class="empty-state-icon"><i class="fas fa-circle-info"></i></div><h1>No recent order</h1><p>Looks like you haven\'t placed an order yet.</p><a class="btn btn-primary" href="../../">Back to home</a>';
} else {
  const isEasypaisa = order.payment && order.payment.method === 'EasyPaisa';
  const reviewBanner = isEasypaisa
    ? '<div class="review-banner"><i class="fas fa-clock"></i><div><strong>We\'re reviewing your payment</strong><span>Your EasyPaisa transfer'+(order.payment.txId?' (TID: <b>'+order.payment.txId+'</b>)':'')+' is being verified by our team. Once confirmed, your order will move to <b>processing</b> and we\'ll dispatch it within 24 hours. You can track the status anytime in <a href="../profile/">My account</a>.</span></div></div>'
    : '';
  root.innerHTML =
    '<div class="thanks-check"><i class="fas fa-check"></i></div>' +
    '<h1>Thank you for your order!</h1>' +
    '<p>Your order <strong>#'+order.id+'</strong> has been received'+(isEasypaisa?' and is awaiting payment review':' and is being processed')+'. A confirmation will be sent to '+order.user.email+'.</p>' +
    reviewBanner +
    '<div class="card" style="text-align:left;margin:24px auto;max-width:480px;">' +
      '<h3 style="margin-bottom:12px;">Order summary</h3>' +
      order.items.map(i => '<div class="summary-row"><span>'+i.name+' × '+i.qty+'</span><span>'+ZEN.fmt(i.price * i.qty)+'</span></div>').join('') +
      '<div class="summary-row total"><span>Total</span><span>'+ZEN.fmt(order.totals.total)+'</span></div>' +
    '</div>' +
    '<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">' +
      '<a class="btn btn-primary" href="../profile/">View my orders</a>' +
      '<a class="btn btn-secondary" href="../../men/">Continue shopping</a>' +
    '</div>';
}
</script>
</body>
</html>
