<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<main>

  <section class="page-head">
    <div class="container">
      <div class="crumbs"><a href="../">Home</a> · Admin</div>
      <h1>Admin dashboard</h1>
      <p class="text-muted">Verify and manage incoming orders.</p>
    </div>
  </section>
  <section class="container section-tight" id="admin-root"></section>
</main>
<script src="../assets/js/data.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/auth.js"></script>
<script src="../assets/js/orders.js"></script>
<script src="../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
function render() {
  const orders = ZEN.getOrders();
  const stats = {
    total: orders.length,
    pending: orders.filter(o => o.status === 'pending').length,
    approved: orders.filter(o => o.status === 'approved').length,
    revenue: orders.filter(o => o.status === 'approved').reduce((a,o) => a + o.totals.total, 0),
  };
  const root = document.getElementById('admin-root');
  root.innerHTML =
    '<div class="admin-stats">' +
      '<div class="stat-card"><span>Total orders</span><strong>'+stats.total+'</strong></div>' +
      '<div class="stat-card"><span>Pending</span><strong>'+stats.pending+'</strong></div>' +
      '<div class="stat-card"><span>Approved</span><strong>'+stats.approved+'</strong></div>' +
      '<div class="stat-card"><span>Revenue</span><strong>'+ZEN.fmt(stats.revenue)+'</strong></div>' +
    '</div>' +
    (orders.length ? '<div class="order-list">' + orders.map(orderHtml).join('') + '</div>'
      : '<div class="empty-state"><div class="empty-state-icon"><i class="fas fa-inbox"></i></div><h3>No orders yet</h3><p>Place an order on the site to see it appear here.</p></div>');
  root.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', () => {
    const a = b.dataset.action; const id = b.dataset.id;
    if (a === 'approve') { ZEN.updateOrderStatus(id, 'approved'); ZEN.toast('Order approved', 'success'); }
    if (a === 'reject') { ZEN.updateOrderStatus(id, 'rejected'); ZEN.toast('Order rejected'); }
    if (a === 'pending') { ZEN.updateOrderStatus(id, 'pending'); }
    if (a === 'delete') { if (!confirm('Delete this order?')) return; ZEN.deleteOrder(id); ZEN.toast('Order deleted'); }
    render();
  }));
}
function orderHtml(o) {
  return '<div class="order"><div class="order-head"><div><h4>#'+o.id+' · '+o.user.name+'</h4>' +
    '<div class="order-meta">'+new Date(o.createdAt).toLocaleString()+' · '+o.payment.method+' · '+o.address.city+'</div></div>' +
    '<span class="status status-'+o.status+'">'+o.status+'</span></div>' +
    '<div class="order-items">' + o.items.map(i => '<div class="order-item"><span>'+i.name+(i.size?' ('+i.size+')':'')+' × '+i.qty+'</span><span>'+ZEN.fmt(i.price * i.qty)+'</span></div>').join('') + '</div>' +
    '<div class="order-total"><span>Total</span><span>'+ZEN.fmt(o.totals.total)+'</span></div>' +
    '<div class="admin-actions" style="margin-top:12px;">' +
      (o.status !== 'approved' ? '<button class="btn btn-primary" data-action="approve" data-id="'+o.id+'"><i class="fas fa-check"></i> Approve</button>' : '') +
      (o.status !== 'rejected' ? '<button class="btn btn-secondary" data-action="reject" data-id="'+o.id+'"><i class="fas fa-xmark"></i> Reject</button>' : '') +
      (o.status !== 'pending' ? '<button class="btn btn-ghost" data-action="pending" data-id="'+o.id+'">Mark pending</button>' : '') +
      '<button class="btn btn-ghost" data-action="delete" data-id="'+o.id+'" style="color:var(--c-danger);"><i class="fas fa-trash"></i> Delete</button>' +
    '</div></div>';
}
render();
</script>
</body>
</html>
