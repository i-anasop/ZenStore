<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>

  <section class="auth-shell">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to access your account and orders.</p>
      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email">
          <span class="err" id="email-err"></span>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password">
          <span class="err" id="password-err"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>
        <p class="form-foot">Don't have an account? <a href="../signup/">Create one</a></p>
      </form>
    </div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
document.getElementById('login-form').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  document.getElementById('email-err').textContent = '';
  document.getElementById('password-err').textContent = '';
  const r = ZEN.login({ email, password });
  if (!r.ok) { ZEN.toast(r.error, 'error'); document.getElementById('password-err').textContent = r.error; return; }
  ZEN.toast('Welcome back!', 'success');
  const next = new URLSearchParams(location.search).get('next');
  setTimeout(() => location.href = next || ZEN.url('account/profile/'), 600);
});
</script>
</body>
</html>
