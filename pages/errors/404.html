<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oops! We're Lost · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <style>
    .cute-404 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      text-align: center;
      padding: 2rem;
    }
    .bot-illustration {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 2rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .bot-body {
      width: 120px;
      height: 120px;
      background: #f8fafc;
      border: 4px solid #0f172a;
      border-radius: 40px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 0 #e2e8f0;
    }
    .bot-eyes {
      display: flex;      gap: 20px;
    }
    .eye {
      width: 15px;
      height: 15px;
      background: #0f172a;
      border-radius: 50%;
      animation: blink 4s infinite;
    }
    @keyframes blink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
    .error-code {
      font-size: 10rem;
      font-weight: 900;
      color: #f1f5f9;
      position: absolute;
      z-index: -1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      letter-spacing: -5px;
    }
    .cute-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: #0f172a;
      margin-bottom: 1rem;
    }
    .cute-text {
      color: #64748b;
      max-width: 400px;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn-group {
      display: flex;
      gap: 1rem;
    }
  </style>
</head>
<body>
<main>
  <div class="container">
    <div class="cute-404">
      <div class="bot-illustration">
        <div class="error-code">404</div>
        <div class="bot-body">
          <div class="bot-eyes">
            <div class="eye"></div>
            <div class="eye"></div>
          </div>
        </div>
      </div>
      <h1 class="cute-title">Aww, snap!</h1>
      <p class="cute-text">Our bot looked everywhere but couldn't find this page. Maybe it went on a shoe-shopping spree?</p>
      <div class="btn-group">
        <a href="../../" class="btn btn-primary btn-lg">Back to Safety</a>
        <a href="../men/" class="btn btn-secondary btn-lg">Shop New Arrivals</a>
      </div>
    </div>
  </div>
</main>

<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>

</body>
</html>
