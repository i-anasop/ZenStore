<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>
  <section class="auth-shell">
    <div class="auth-split">
      <aside class="auth-aside">
        <div class="auth-aside-brand"><span class="brand-mark">Z</span><span>Zen Store</span></div>
        <div class="auth-aside-caption">
          <span class="tagline">Welcome back</span>
          <h2>Step back into Zen.</h2>
          <p>Your favourites, orders, and faster checkout are waiting.</p>
        </div>
      </aside>
      <div class="auth-form-pane">
        <div class="form-card">
          <h2>Sign in</h2>
          <p class="subtitle">Enter your email and password to continue.</p>
          <form id="login-form" novalidate>
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
              <span class="err" id="email-err"></span>
            </div>
            <div class="field">
              <label for="password">Password</label>
              <div class="input-with-action">
                <input type="password" id="password" required autocomplete="current-password" placeholder="Your password">
                <button type="button" class="input-action-btn" id="toggle-pw" aria-label="Show password"><i class="fas fa-eye"></i></button>
              </div>
              <span class="err" id="password-err"></span>
            </div>
            <label class="checkbox-row"><input type="checkbox" id="remember" checked> Remember me on this device</label>
            <button type="submit" class="btn btn-primary btn-block btn-lg">Sign in</button>
            <p class="form-foot">Don't have an account? <a href="../signup/">Create one</a></p>
          </form>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/chat.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const setErr = (id, msg) => { $(id+'-err').textContent = msg || ''; $(id).classList.toggle('invalid', !!msg); $(id).classList.toggle('valid', !msg && $(id).value.trim().length > 0); };
  $('toggle-pw').addEventListener('click', () => {
    const i = $('password'); const isPw = i.type === 'password';
    i.type = isPw ? 'text' : 'password';
    $('toggle-pw').innerHTML = isPw ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
  });
  $('email').addEventListener('blur', () => setErr('email', emailRe.test($('email').value.trim()) ? '' : 'Enter a valid email address'));
  $('password').addEventListener('blur', () => setErr('password', $('password').value.length >= 1 ? '' : 'Password is required'));
  $('login-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = $('email').value.trim();
    const password = $('password').value;
    let ok = true;
    if (!emailRe.test(email)) { setErr('email', 'Enter a valid email address'); ok = false; }
    if (!password) { setErr('password', 'Password is required'); ok = false; }
    if (!ok) return;
    const r = ZEN.login({ email, password });
    if (!r.ok) { ZEN.toast(r.error, 'error'); setErr('password', r.error); return; }
    ZEN.toast('Welcome back!', 'success');
    const next = new URLSearchParams(location.search).get('next');
    setTimeout(() => location.href = next || ZEN.url('account/profile/'), 500);
  });
})();
</script>
</body>
</html>
