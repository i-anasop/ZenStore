<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile · Zen Store</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap"></noscript>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"></noscript>
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<main>
  <section class="page-head">
    <div class="container">
      <div class="crumbs"><a href="../../">Home</a> · Account</div>
      <h1>My account</h1>
    </div>
  </section>
  <section class="container">
    <div class="profile-grid" id="profile-root"></div>
  </section>
</main>
<script src="../../assets/js/data.js"></script>
<script src="../../assets/js/cart.js"></script>
<script src="../../assets/js/auth.js"></script>
<script src="../../assets/js/orders.js"></script>
<script src="../../assets/js/base.js"></script>
<script>ZEN.initLayout('');</script>
<script>
if (!ZEN.requireAuth()) { /* redirected */ } else {
  const user = ZEN.getUser();
  const orders = ZEN.getOrders().filter(o => o.user.email === user.email);
  const initials = user.name.split(' ').map(x => x[0]).slice(0,2).join('').toUpperCase();
  const totalSpent = orders.reduce((a, o) => a + (o.totals && o.totals.total ? o.totals.total : 0), 0);
  const memberSince = user.createdAt ? new Date(user.createdAt) : new Date();
  const memberSinceStr = memberSince.toLocaleString('en-US', { month: 'short', year: 'numeric' });
  const root = document.getElementById('profile-root');
  function orderHtml(o) {
    return '<div class="order"><div class="order-head"><div><h4>Order #'+o.id+'</h4><div class="order-meta">'+new Date(o.createdAt).toLocaleString()+' · '+o.payment.method+'</div></div><span class="status status-'+o.status+'">'+o.status+'</span></div>' +
      '<div class="order-items">' + o.items.map(i => '<div class="order-item"><span>'+i.name+(i.size?' (Size '+i.size+')':'')+' × '+i.qty+'</span><span>'+ZEN.fmt(i.price * i.qty)+'</span></div>').join('') + '</div>' +
      '<div class="order-total"><span>Total</span><span>'+ZEN.fmt(o.totals.total)+'</span></div></div>';
  }
  const tier = orders.length >= 5 ? 'Gold member' : orders.length >= 1 ? 'Member' : 'New member';
  const lastOrder = orders.length ? new Date(orders[0].createdAt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '—';
  root.innerHTML =
    '<aside class="profile-card">' +
      '<div class="profile-cover"></div>' +
      '<div class="profile-card-body">' +
        '<div class="profile-avatar">'+initials+'</div>' +
        '<div class="profile-name-wrap"><h3 id="profile-name">'+user.name+'</h3><span class="member-badge"><i class="fas fa-star"></i> '+tier+'</span></div>' +
        '<p class="profile-email">'+user.email+'</p>' +
        '<div class="profile-mini-stats">' +
          '<div class="profile-mini-stat"><strong>'+orders.length+'</strong><span>Orders</span></div>' +
          '<div class="profile-mini-stat"><strong>'+memberSinceStr+'</strong><span>Joined</span></div>' +
        '</div>' +
        '<button class="btn btn-secondary btn-block" id="edit-name-btn"><i class="fas fa-pen"></i> Edit name</button>' +
        '<button class="btn btn-secondary btn-block" id="logout-btn"><i class="fas fa-right-from-bracket"></i> Sign out</button>' +
      '</div>' +
    '</aside>' +
    '<div>' +
      '<div class="profile-stats">' +
        '<div class="profile-stat"><div class="profile-stat-icon"><i class="fas fa-box"></i></div><div><div class="profile-stat-num">'+orders.length+'</div><div class="profile-stat-label">Total orders</div></div></div>' +
        '<div class="profile-stat"><div class="profile-stat-icon"><i class="fas fa-wallet"></i></div><div><div class="profile-stat-num">'+ZEN.fmt(totalSpent)+'</div><div class="profile-stat-label">Total spent</div></div></div>' +
        '<div class="profile-stat"><div class="profile-stat-icon"><i class="fas fa-clock-rotate-left"></i></div><div><div class="profile-stat-num" style="font-size:1rem;">'+lastOrder+'</div><div class="profile-stat-label">Last order</div></div></div>' +
      '</div>' +
      '<div class="quick-actions">' +
        '<a class="quick-action" href="../../men/"><div class="quick-action-icon"><i class="fas fa-bag-shopping"></i></div><strong>Continue shopping</strong><span>Browse new arrivals</span></a>' +
        '<a class="quick-action" href="../../cart/"><div class="quick-action-icon"><i class="fas fa-cart-shopping"></i></div><strong>View cart</strong><span>Check items in bag</span></a>' +
        '<a class="quick-action" href="mailto:support@zenstore.example"><div class="quick-action-icon"><i class="fas fa-headset"></i></div><strong>Need help?</strong><span>Contact support</span></a>' +
      '</div>' +
      '<div class="section-block">' +
        '<div class="section-block-head"><span class="num"><i class="fas fa-clock-rotate-left"></i></span><h3>Order history</h3></div>' +
        (orders.length ? '<div class="order-list">' + orders.map(orderHtml).join('') + '</div>'
          : '<div class="empty-state"><div class="empty-state-icon"><i class="fas fa-box"></i></div><h3>No orders yet</h3><p>When you place your first order, it will show up here.</p><a class="btn btn-primary" href="../../men/">Start shopping</a></div>') +
      '</div>' +
    '</div>';
  document.getElementById('logout-btn').addEventListener('click', () => { ZEN.logout(); ZEN.toast('Signed out'); setTimeout(() => location.href = ZEN.url(''), 400); });
  document.getElementById('edit-name-btn').addEventListener('click', () => {
    const card = document.querySelector('.profile-card');
    if (card.querySelector('.edit-inline')) return;
    const editor = document.createElement('div');
    editor.className = 'edit-inline';
    editor.innerHTML =
      '<input type="text" class="input" id="edit-name-input" value="'+user.name.replace(/"/g,'&quot;')+'" maxlength="60">' +
      '<div style="display:flex;gap:8px;margin-top:8px;">' +
        '<button class="btn btn-primary" id="save-name-btn" style="flex:1;"><i class="fas fa-check"></i> Save</button>' +
        '<button class="btn btn-ghost" id="cancel-name-btn" style="flex:1;">Cancel</button>' +
      '</div>';
    document.getElementById('edit-name-btn').insertAdjacentElement('beforebegin', editor);
    const input = document.getElementById('edit-name-input');
    input.focus(); input.select();
    document.getElementById('cancel-name-btn').addEventListener('click', () => editor.remove());
    document.getElementById('save-name-btn').addEventListener('click', () => {
      const newName = (input.value || '').trim();
      if (newName.length < 2) { ZEN.toast('Name must be at least 2 characters', 'error'); input.focus(); return; }
      ZEN.ls.set('user', { ...user, name: newName });
      const users = ZEN.ls.get('users', []);
      const i = users.findIndex(u => u.email === user.email);
      if (i >= 0) { users[i] = { ...users[i], name: newName }; ZEN.ls.set('users', users); }
      ZEN.toast('Name updated', 'success');
      setTimeout(() => location.reload(), 400);
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('save-name-btn').click(); }
      if (e.key === 'Escape') editor.remove();
    });
  });
}
</script>
</body>
</html>
